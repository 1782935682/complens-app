name: AI Review (DeepSeek)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取 PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

      - name: DeepSeek 代码审查
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, subprocess, sys

          diff = open('/tmp/pr.diff').read()
          if not diff.strip():
              print("diff 为空，跳过审查")
              sys.exit(0)

          if len(diff) > 30000:
              diff = diff[:30000] + "\n\n[... diff 过长，仅展示前 30000 字符 ...]"

          api_key   = os.environ['DEEPSEEK_API_KEY']
          pr_number = os.environ['PR_NUMBER']
          repo      = os.environ['REPO']

          prompt = f"""你是 CompCheck（成分小查）项目的代码审查员，请对以下 PR 变更进行详细的代码审查并输出中文报告。

## 项目背景

- **产品**：食品添加剂查询 App（主线），化妆品成分（次线）
- **技术栈**：纯 JavaScript ES Modules，无框架、无 TypeScript、无打包工具（Vite/webpack 等均禁止）
- **核心功能**：过敏原用户档案（全局警告）、多类别路由（/food/... 和 /cosmetics/...）

## 审查维度

1. **逻辑正确性** — 函数逻辑是否正确，边界条件和异常路径是否处理
2. **技术栈合规** — 是否引入禁止依赖（React / Vue / TypeScript / Vite 等）
3. **数据模型完整性** — 食品添加剂必填字段：id、nameCn、category、description、riskLevel、gbStatus、sourceNote；数组字段（allergenTypes、cautionFor、foodCategories）不得省略键名
4. **过敏原系统** — 存储 key 必须为 `compcheck:allergens`；接口必须暴露 `getUserAllergens()` 和 `setUserAllergens(ids)`；搜索/详情/分析页是否检查并高亮过敏原
5. **多类别路由** — `resolveRoute()` 返回值是否包含 `category` 字段；路由是否遵循 `/food/...` 和 `/cosmetics/...` 前缀
6. **安全性** — HTML 输出是否经过转义（防 XSS）；有无敏感信息硬编码
7. **代码质量** — 函数职责是否单一；是否存在重复逻辑；命名是否清晰；注释是否必要

## 输出格式（严格按照此结构）

## DeepSeek 代码审查

### ✅ 做对的地方
（列出值得肯定的实现，附文件名）

### ⚠️ 需要关注
（可以改进的地方，附文件名和行号，说明原因）

### ❌ 必须修复
（错误或严重问题，附文件名和行号，说明如何修复）

### 总体评价
**通过** / **需要修改** / **不通过**（选一个，加粗，后面一句简短说明原因）

---

## 本次 PR 变更

```diff
{diff}
```"""

          payload = json.dumps({{
              "model": "deepseek-chat",
              "messages": [
                  {{"role": "user", "content": prompt}}
              ],
              "max_tokens": 3000,
              "temperature": 0.3
          }}).encode('utf-8')

          req = urllib.request.Request(
              'https://api.deepseek.com/v1/chat/completions',
              data=payload,
              headers={{
                  'Authorization': f'Bearer {{api_key}}',
                  'Content-Type': 'application/json'
              }}
          )

          try:
              resp   = urllib.request.urlopen(req, timeout=120)
              result = json.loads(resp.read())
              review = result['choices'][0]['message']['content']
          except Exception as e:
              review = f"⚠️ DeepSeek 审查请求失败：{{e}}\n\n请检查 DEEPSEEK_API_KEY 是否正确配置。"

          with open('/tmp/review.md', 'w') as f:
              f.write(review)

          subprocess.run(
              ['gh', 'pr', 'comment', pr_number, '--repo', repo, '--body-file', '/tmp/review.md'],
              check=True
          )
          PYEOF
