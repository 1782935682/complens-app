name: AI Review (DeepSeek / 百炼)

on:
  pull_request:
    types: [opened, reopened]
    paths:
      - 'src/**'
      - 'scripts/**'
  issue_comment:
    types: [created]

concurrency:
  group: ai-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request &&
       (contains(github.event.comment.body, '@deepseek') ||
        contains(github.event.comment.body, '@bailian')))
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检出 PR 分支（手动触发时）
        if: github.event_name == 'issue_comment'
        run: gh pr checkout ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取 PR diff 和编号
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER_AUTO: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            PR_NUM="$ISSUE_NUMBER"
            BASE=$(gh pr view "$PR_NUM" --repo "$REPO" --json baseRefName --jq '.baseRefName')
            git diff "origin/$BASE"...HEAD > /tmp/pr.diff
          else
            PR_NUM="$PR_NUMBER_AUTO"
            git diff "origin/$BASE_REF"...HEAD > /tmp/pr.diff
          fi
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: 选择 AI 提供商
        id: ai-config
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if echo "$COMMENT_BODY" | grep -q '@bailian'; then
            echo "api_key=$DASHSCOPE_API_KEY"  >> "$GITHUB_OUTPUT"
            echo "api_base=https://dashscope.aliyuncs.com/compatible-mode/v1" >> "$GITHUB_OUTPUT"
            echo "model=qwen-max"              >> "$GITHUB_OUTPUT"
            echo "provider=阿里云百炼 (qwen-max)" >> "$GITHUB_OUTPUT"
          else
            echo "api_key=$DEEPSEEK_API_KEY"   >> "$GITHUB_OUTPUT"
            echo "api_base=https://api.deepseek.com/v1" >> "$GITHUB_OUTPUT"
            echo "model=deepseek-chat"         >> "$GITHUB_OUTPUT"
            echo "provider=DeepSeek (deepseek-chat)" >> "$GITHUB_OUTPUT"
          fi

      - name: AI 代码审查
        env:
          AI_API_KEY:  ${{ steps.ai-config.outputs.api_key }}
          AI_API_BASE: ${{ steps.ai-config.outputs.api_base }}
          AI_MODEL:    ${{ steps.ai-config.outputs.model }}
          AI_PROVIDER: ${{ steps.ai-config.outputs.provider }}
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:   ${{ steps.pr-info.outputs.pr_number }}
          REPO:        ${{ github.repository }}
        run: python3 scripts/ai-review.py
