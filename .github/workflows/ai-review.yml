name: AI Review (DeepSeek)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '@deepseek'))
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检出 PR 分支（手动触发时）
        if: github.event_name == 'issue_comment'
        run: gh pr checkout ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取 PR diff 和编号
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUM="${{ github.event.issue.number }}"
            BASE=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json baseRefName --jq '.baseRefName')
            git diff "origin/$BASE"...HEAD > /tmp/pr.diff
          else
            PR_NUM="${{ github.event.pull_request.number }}"
            git diff "origin/${{ github.base_ref }}"...HEAD > /tmp/pr.diff
          fi
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: DeepSeek 代码审查
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: python3 scripts/deepseek-review.py
