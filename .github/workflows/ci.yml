name: CI

on:
  pull_request:
    paths:
      - 'public/**'
      - 'src/**'
      - 'backend/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'src/**'
      - 'backend/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'

      - run: npm ci

      - run: npm run lint

      - run: npm run test

      - run: npm run build

      - run: npm ci
        working-directory: backend

      - run: npm run typecheck
        working-directory: backend

      - run: npm test
        working-directory: backend

      - run: npm run build
        working-directory: backend
