services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: compcheck
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      DATABASE_URL: postgres://postgres:password@postgres:5432/compcheck
    ports:
      - "3000:3000"

volumes:
  postgres-data:
