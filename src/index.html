<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="CompCheck 成分小查，成分查询与成分表分析应用" />
    <meta name="theme-color" content="#116a5b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="成分镜" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CompCheck 成分小查</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="connection-banner" data-connection-banner hidden role="status" aria-live="polite">
      当前离线，部分功能不可用
    </div>
    <header class="app-header">
      <a class="brand" href="#/food" data-route data-brand-link>
        <span class="brand-mark">CC</span>
        <span>CompCheck</span>
      </a>
      <nav class="nav">
        <a href="#/food/search" data-route data-nav-key="search">搜索</a>
        <a href="#/food/compare" data-route data-nav-key="compare">对比</a>
        <a href="#/food/scan" data-route data-nav-key="scan">扫描</a>
        <a href="#/food/analyze" data-route data-nav-key="analyze">分析</a>
        <a href="#/food/data" data-route data-nav-key="data">数据</a>
        <a href="#/food/reports" data-route data-nav-key="reports">报告</a>
        <a href="#/food/history" data-route data-nav-key="history">历史</a>
        <a href="#/food/favorites" data-route data-nav-key="favorites">收藏</a>
        <a href="#/food/membership" data-route data-nav-key="membership">会员</a>
        <a href="#/food/settings" data-route data-nav-key="settings">设置</a>
      </nav>
    </header>
    <main id="app" class="app-shell" aria-live="polite" tabindex="-1">
      <section class="section">
        <p class="empty">正在加载...</p>
      </section>
    </main>
    <footer class="app-footer">
      <p>内容仅用于日常成分理解，不提供医疗诊断或治疗建议。<a class="inline-link" href="#/food/legal" data-route data-shell-legal-link>隐私与条款</a></p>
    </footer>
    <nav class="mobile-tabbar" aria-label="移动端主导航">
      <a href="#/food" data-route data-mobile-nav-key="home">首页</a>
      <a href="#/food/scan" data-route data-mobile-nav-key="scan">识别</a>
      <a href="#/food/search" data-route data-mobile-nav-key="search">搜索</a>
      <a href="#/food/history" data-route data-mobile-nav-key="history">历史</a>
      <a href="#/food/settings" data-route data-mobile-nav-key="settings">我的</a>
    </nav>
    <aside class="install-prompt" data-install-prompt hidden aria-label="添加到主屏幕提示">
      <p data-install-prompt-message>添加到主屏幕，离线也能打开本机历史和收藏。</p>
      <div class="install-prompt__actions">
        <button type="button" data-install-prompt-action>添加</button>
        <button type="button" class="secondary" data-install-prompt-dismiss>稍后</button>
      </div>
    </aside>
    <script type="module" src="./main.js"></script>
  </body>
</html>
